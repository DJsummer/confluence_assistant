<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confluence AI 助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --accent: #5b6ef5;
      --accent-hover: #7485ff;
      --text: #e2e4f0;
      --text-muted: #7b82a8;
      --user-bg: #1e2d5a;
      --ai-bg: #1a1d27;
      --danger: #e05c5c;
      --success: #4caf7d;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 600; letter-spacing: .3px; }
    header span.badge {
      margin-left: auto;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted);
    }
    header span.badge.online { color: var(--success); }

    /* ── 主体 ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 侧栏（历史 & 设置） ── */
    aside {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    aside section { padding: 16px; border-bottom: 1px solid var(--border); }
    aside h3 { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; letter-spacing: .8px; }
    .setting-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .setting-row label { font-size: 12px; color: var(--text-muted); }
    .setting-row input, .setting-row select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    .setting-row input:focus, .setting-row select:focus { border-color: var(--accent); }
    #sync-btn {
      width: 100%;
      padding: 7px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    #sync-btn:hover { background: var(--border); }
    #sync-status { font-size: 11px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }

    /* ── 聊天区 ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* 欢迎屏 */
    .welcome {
      margin: auto;
      text-align: center;
      opacity: .6;
    }
    .welcome .icon { font-size: 48px; margin-bottom: 12px; }
    .welcome p { font-size: 14px; color: var(--text-muted); }

    /* 消息气泡 */
    .msg { display: flex; gap: 12px; align-items: flex-start; max-width: 860px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: var(--surface2);
    }
    .msg.user .avatar { background: var(--accent); }
    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 44px);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble { background: var(--user-bg); border-radius: 12px 2px 12px 12px; }
    .msg.ai  .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-radius: 2px 12px 12px 12px; }

    /* 来源引用 */
    .sources {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      text-decoration: none;
      transition: border-color .15s, color .15s;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-chip:hover { border-color: var(--accent); color: var(--text); }

    /* 打字动画 */
    .typing span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--text-muted);
      animation: bounce .9s infinite;
      margin: 0 2px;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── 输入区 ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #question {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    #question:focus { border-color: var(--accent); }
    #question::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { background: var(--surface2); cursor: not-allowed; }

    #clear-btn {
      height: 42px; padding: 0 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    #clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <span class="logo">🤖</span>
  <h1>UICA EM_Service Confluence AI 助手</h1>
  <span class="badge" id="status-badge">检查中…</span>
</header>

<main>
  <aside>
    <section>
      <h3>设置</h3>
      <div class="setting-row">
        <label>返回条数 (top_k)</label>
        <input type="number" id="top-k" value="5" min="1" max="20" />
      </div>
      <div class="setting-row">
        <label>权限组（逗号分隔）</label>
        <input type="text" id="groups" placeholder="teamA,teamB" />
      </div>
    </section>
    <section>
      <h3>数据同步</h3>
      <button id="sync-btn">🔄 触发同步</button>
      <div id="sync-status"></div>
    </section>
  </aside>

  <div id="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="icon">📚</div>
        <p>基于 Confluence 知识库的 AI 问答</p>
        <p style="margin-top:6px;font-size:12px">输入问题开始对话</p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="question" rows="1" placeholder="输入问题，按 Enter 发送，Shift+Enter 换行…"></textarea>
      <button id="clear-btn" title="清空对话">清空</button>
      <button id="send-btn" title="发送">➤</button>
    </div>
  </div>
</main>

<script>
  const API = '';   // 同源：空字符串；跨域时填 http://host:8000

  const messagesEl = document.getElementById('messages');
  const questionEl = document.getElementById('question');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const syncBtn    = document.getElementById('sync-btn');
  const syncStatus = document.getElementById('sync-status');
  const badge      = document.getElementById('status-badge');
  const welcome    = document.getElementById('welcome');

  let history = [];   // [{role, content}]

  // ── 健康检查 ──────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(API + '/health');
      if (r.ok) {
        badge.textContent = '● 在线';
        badge.className = 'badge online';
      } else throw new Error();
    } catch {
      badge.textContent = '● 离线';
      badge.className = 'badge';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // ── 自动调整输入框高度 ─────────────────────────────────────
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 160) + 'px';
  });

  // ── 快捷键 ────────────────────────────────────────────────
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', clearChat);
  syncBtn.addEventListener('click', triggerSync);

  // ── 发送问题 ──────────────────────────────────────────────
  async function send() {
    const q = questionEl.value.trim();
    if (!q) return;

    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;
    welcome && (welcome.style.display = 'none');

    appendMsg('user', q);

    const topK   = parseInt(document.getElementById('top-k').value) || 5;
    const groups = document.getElementById('groups').value
      .split(',').map(s => s.trim()).filter(Boolean);

    const typingId = appendTyping();

    try {
      const res = await fetch(API + '/chat/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: topK, user_groups: groups, history }),
      });
      removeTyping(typingId);

      if (!res.ok) {
        appendMsg('ai', `❌ 请求失败：${res.status} ${res.statusText}`);
        return;
      }
      const data = await res.json();
      appendMsg('ai', data.answer, data.sources);

      history.push({ role: 'user',      content: q });
      history.push({ role: 'assistant', content: data.answer });
      // 保留最近 12 条（6 轮）
      if (history.length > 12) history = history.slice(-12);

    } catch (err) {
      removeTyping(typingId);
      appendMsg('ai', `❌ 网络错误：${err.message}`);
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }

  // ── DOM 辅助 ──────────────────────────────────────────────
  function appendMsg(role, text, sources = []) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🙋' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const textNode = document.createElement('div');
    textNode.textContent = text;
    bubble.appendChild(textNode);

    if (sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.className = 'source-chip';
        a.textContent = `📄 ${s.title}`;
        a.title = s.path + '\n' + s.url;
        if (s.url) { a.href = s.url; a.target = '_blank'; }
        srcDiv.appendChild(a);
      });
      bubble.appendChild(srcDiv);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendTyping() {
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = id;
    div.innerHTML = `<div class="avatar">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    const w = document.createElement('div');
    w.className = 'welcome';
    w.id = 'welcome';
    w.innerHTML = '<div class="icon">📚</div><p>基于 Confluence 知识库的 AI 问答</p><p style="margin-top:6px;font-size:12px">输入问题开始对话</p>';
    messagesEl.appendChild(w);
  }

  // ── 触发同步 ──────────────────────────────────────────────
  async function triggerSync() {
    syncBtn.disabled = true;
    syncStatus.textContent = '正在提交…';
    try {
      const res = await fetch(API + '/sync/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_sync: false }),
      });
      const data = await res.json();
      syncStatus.textContent = `已入队 task_id: ${data.task_id.slice(0, 8)}…`;
      pollSync(data.task_id);
    } catch (e) {
      syncStatus.textContent = '提交失败：' + e.message;
      syncBtn.disabled = false;
    }
  }

  async function pollSync(taskId) {
    const timer = setInterval(async () => {
      try {
        const res = await fetch(API + `/sync/${taskId}`);
        const data = await res.json();
        syncStatus.textContent = `状态：${data.status}`;
        if (['SUCCESS', 'FAILURE', 'REVOKED'].includes(data.status)) {
          clearInterval(timer);
          syncBtn.disabled = false;
        }
      } catch { clearInterval(timer); syncBtn.disabled = false; }
    }, 3000);
  }
</script>
</body>
</html>
