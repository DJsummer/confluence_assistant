<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confluence AI 助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nokia-blue: #124191;
      --nokia-blue-dark: #0d2f6e;
      --nokia-blue-light: #e8eef8;
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f4f5f7;
      --border: #dde1e9;
      --accent: #124191;
      --accent-hover: #0d2f6e;
      --text: #172b4d;
      --text-muted: #5e6c84;
      --user-bg: #e8eef8;
      --ai-bg: #ffffff;
      --danger: #de350b;
      --success: #00875a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Charlie Display", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶栏 ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 24px;
      height: 56px;
      background: var(--nokia-blue);
      flex-shrink: 0;
      box-shadow: 0 2px 4px rgba(0,0,0,.18);
    }
    header .nokia-logo {
      font-size: 22px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      line-height: 1;
    }
    header .divider {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,.35);
    }
    header h1 {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,.92);
      letter-spacing: .2px;
    }
    header span.badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.75);
      border: 1px solid rgba(255,255,255,.25);
    }
    header span.badge.online {
      background: rgba(0,200,120,.2);
      color: #a3f0cc;
      border-color: rgba(0,200,120,.4);
    }

    /* ── 主体 ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 侧栏 ── */
    aside {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    aside section { padding: 16px; border-bottom: 1px solid var(--border); }
    aside h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      letter-spacing: .8px;
      font-weight: 600;
    }
    .setting-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .setting-row label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .setting-row input, .setting-row select {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    .setting-row input:focus, .setting-row select:focus { border-color: var(--accent); }
    #sync-btn {
      width: 100%;
      padding: 7px;
      background: var(--nokia-blue-light);
      border: 1px solid var(--border);
      color: var(--nokia-blue);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, border-color .15s;
    }
    #sync-btn:hover { background: #d0ddf4; border-color: var(--nokia-blue); }
    #sync-status { font-size: 11px; color: var(--text-muted); margin-top: 6px; min-height: 16px; }

    /* ── 聊天区 ── */
    #chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* 欢迎屏 */
    .welcome {
      margin: auto;
      text-align: center;
      opacity: .75;
    }
    .welcome .icon { font-size: 52px; margin-bottom: 16px; }
    .welcome h2 { font-size: 18px; color: var(--nokia-blue); font-weight: 600; margin-bottom: 8px; }
    .welcome p { font-size: 14px; color: var(--text-muted); }

    /* 消息气泡 */
    .msg { display: flex; gap: 12px; align-items: flex-start; max-width: 900px; width: 100%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg.user .avatar { background: var(--nokia-blue); border-color: var(--nokia-blue); }
    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 46px);
      word-break: break-word;
      white-space: pre-wrap;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
    }
    .msg.user .bubble {
      background: var(--nokia-blue);
      color: #ffffff;
      border-radius: 8px 2px 8px 8px;
    }
    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-radius: 2px 8px 8px 8px;
      color: var(--text);
    }

    /* 来源引用 */
    .sources {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 3px;
      background: var(--nokia-blue-light);
      border: 1px solid #c2d2ed;
      color: var(--nokia-blue);
      text-decoration: none;
      transition: background .15s, border-color .15s;
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .source-chip:hover { background: #d0ddf4; border-color: var(--nokia-blue); }

    /* 打字动画 */
    .typing span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--text-muted);
      animation: bounce .9s infinite;
      margin: 0 2px;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── 输入区 ── */
    #input-area {
      border-top: 2px solid var(--border);
      padding: 16px 32px;
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #question {
      flex: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color .15s;
    }
    #question:focus { border-color: var(--nokia-blue); }
    #question::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 42px; height: 42px;
      background: var(--nokia-blue);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--nokia-blue-dark); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; }

    #clear-btn {
      height: 42px; padding: 0 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: border-color .15s, color .15s;
      flex-shrink: 0;
    }
    #clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #c1c7d0; border-radius: 3px; }
    #messages::-webkit-scrollbar-thumb:hover { background: #a8b0be; }
  </style>
</head>
<body>

<header>
  <span class="nokia-logo">Nokia</span>
  <span class="divider"></span>
  <h1>UICA EM_Service · Confluence AI 助手</h1>
  <span class="badge" id="status-badge">检查中…</span>
</header>

<main>
  <aside>
    <section>
      <h3>设置</h3>
      <div class="setting-row">
        <label>返回条数 (top_k)</label>
        <input type="number" id="top-k" value="5" min="1" max="20" />
      </div>
      <div class="setting-row">
        <label>权限组（逗号分隔）</label>
        <input type="text" id="groups" placeholder="teamA,teamB" />
      </div>
    </section>
    <section>
      <h3>数据同步</h3>
      <button id="sync-btn">🔄 触发同步</button>
      <div id="sync-status"></div>
    </section>
  </aside>

  <div id="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="icon">📖</div>
        <h2>UICA EM_Service 知识库助手</h2>
        <p>基于 Confluence 内容的智能问答</p>
        <p style="margin-top:6px;font-size:12px">输入问题，按 Enter 发送</p>
      </div>
    </div>

    <div id="input-area">
      <textarea id="question" rows="1" placeholder="输入问题，按 Enter 发送，Shift+Enter 换行…"></textarea>
      <button id="clear-btn" title="清空对话">清空</button>
      <button id="send-btn" title="发送">➤</button>
    </div>
  </div>
</main>

<script>
  const API = '';   // 同源：空字符串；跨域时填 http://host:8000

  const messagesEl = document.getElementById('messages');
  const questionEl = document.getElementById('question');
  const sendBtn    = document.getElementById('send-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const syncBtn    = document.getElementById('sync-btn');
  const syncStatus = document.getElementById('sync-status');
  const badge      = document.getElementById('status-badge');
  const welcome    = document.getElementById('welcome');

  let history = [];   // [{role, content}]

  // ── 健康检查 ──────────────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch(API + '/health');
      if (r.ok) {
        badge.textContent = '● 在线';
        badge.className = 'badge online';
      } else throw new Error();
    } catch {
      badge.textContent = '● 离线';
      badge.className = 'badge';
    }
  }
  checkHealth();
  setInterval(checkHealth, 30000);

  // ── 自动调整输入框高度 ─────────────────────────────────────
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 160) + 'px';
  });

  // ── 快捷键 ────────────────────────────────────────────────
  questionEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);
  clearBtn.addEventListener('click', clearChat);
  syncBtn.addEventListener('click', triggerSync);

  // ── 发送问题 ──────────────────────────────────────────────
  async function send() {
    const q = questionEl.value.trim();
    if (!q) return;

    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;
    welcome && (welcome.style.display = 'none');

    appendMsg('user', q);

    const topK   = parseInt(document.getElementById('top-k').value) || 5;
    const groups = document.getElementById('groups').value
      .split(',').map(s => s.trim()).filter(Boolean);

    const typingId = appendTyping();

    try {
      const res = await fetch(API + '/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: topK, user_groups: groups, history }),
      });

      if (!res.ok) {
        removeTyping(typingId);
        appendMsg('ai', `❌ 请求失败：${res.status} ${res.statusText}`);
        return;
      }

      removeTyping(typingId);

      // 创建流式气泡
      const { bubble, textNode } = appendStreamingBubble();
      let fullAnswer = '';
      let sources = [];

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // 保留不完整的最后一段

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(part.slice(6));
            if (data.delta) {
              fullAnswer += data.delta;
              textNode.textContent = fullAnswer;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
            if (data.done) {
              sources = data.sources || [];
              if (sources.length) appendSources(bubble, sources);
            }
          } catch (_) {}
        }
      }

      history.push({ role: 'user',      content: q });
      history.push({ role: 'assistant', content: fullAnswer });
      if (history.length > 12) history = history.slice(-12);

    } catch (err) {
      removeTyping(typingId);
      appendMsg('ai', `❌ 网络错误：${err.message}`);
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }

  // ── DOM 辅助 ──────────────────────────────────────────────
  function appendStreamingBubble() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const textNode = document.createElement('div');
    bubble.appendChild(textNode);
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return { div, bubble, textNode };
  }

  function appendSources(bubble, sources) {
    if (!sources.length) return;
    const srcDiv = document.createElement('div');
    srcDiv.className = 'sources';
    sources.forEach(s => {
      const a = document.createElement('a');
      a.className = 'source-chip';
      a.textContent = `📄 ${s.title}`;
      a.title = s.path + '\n' + s.url;
      if (s.url) { a.href = s.url; a.target = '_blank'; }
      srcDiv.appendChild(a);
    });
    bubble.appendChild(srcDiv);
  }

  function appendMsg(role, text, sources = []) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🙋' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    const textNode = document.createElement('div');
    textNode.textContent = text;
    bubble.appendChild(textNode);

    if (sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.className = 'source-chip';
        a.textContent = `📄 ${s.title}`;
        a.title = s.path + '\n' + s.url;
        if (s.url) { a.href = s.url; a.target = '_blank'; }
        srcDiv.appendChild(a);
      });
      bubble.appendChild(srcDiv);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function appendTyping() {
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = id;
    div.innerHTML = `<div class="avatar">🤖</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function clearChat() {
    history = [];
    messagesEl.innerHTML = '';
    const w = document.createElement('div');
    w.className = 'welcome';
    w.id = 'welcome';
    w.innerHTML = '<div class="icon">�</div><h2>UICA EM_Service 知识库助手</h2><p>基于 Confluence 内容的智能问答</p><p style="margin-top:6px;font-size:12px">输入问题，按 Enter 发送</p>';
    messagesEl.appendChild(w);
  }

  // ── 触发同步 ──────────────────────────────────────────────
  async function triggerSync() {
    syncBtn.disabled = true;
    syncStatus.textContent = '正在提交…';
    try {
      const res = await fetch(API + '/sync/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_sync: false }),
      });
      const data = await res.json();
      syncStatus.textContent = `已入队 task_id: ${data.task_id.slice(0, 8)}…`;
      pollSync(data.task_id);
    } catch (e) {
      syncStatus.textContent = '提交失败：' + e.message;
      syncBtn.disabled = false;
    }
  }

  async function pollSync(taskId) {
    const timer = setInterval(async () => {
      try {
        const res = await fetch(API + `/sync/${taskId}`);
        const data = await res.json();
        syncStatus.textContent = `状态：${data.status}`;
        if (['SUCCESS', 'FAILURE', 'REVOKED'].includes(data.status)) {
          clearInterval(timer);
          syncBtn.disabled = false;
        }
      } catch { clearInterval(timer); syncBtn.disabled = false; }
    }, 3000);
  }
</script>
</body>
</html>
